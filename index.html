<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czytaj.pl — Stwórz swojego bohatera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --silver:#c0c0c0;
    --silver-dk:#9a9a9a;
    --hi:#ffffff;
    --sh:#808080;
    --sh2:#000000;
    --navy1:#000080;
    --navy2:#1084d0;
    --teal:#037a7a;
    --ink:#0a0a2a;
    --pixel:"Press Start 2P","Courier New",monospace;
    --read:"VT323","Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--read);
    background:var(--teal);
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:4px 4px;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:24px;min-height:100vh;
    image-rendering:pixelated;
  }
  /* ---- window chrome ---- */
  .window{
    width:min(1180px,100%);
    background:var(--silver);
    border:3px solid;
    border-color:var(--hi) var(--sh2) var(--sh2) var(--hi);
    box-shadow:2px 2px 0 var(--sh), inset 1px 1px 0 #dfdfdf;
  }
  .titlebar{
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(90deg,var(--navy1),var(--navy2));
    color:#fff;padding:6px 8px;margin:3px;
  }
  .titlebar .t{font-family:var(--pixel);font-size:12px;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;text-shadow:1px 1px 0 #00003a}
  .titlebar .t .ico{width:16px;height:16px;background:#F7F154;border:2px solid #000;display:inline-block}
  .winbtns{display:flex;gap:4px}
  .winbtns b{
    width:22px;height:20px;background:var(--silver);
    border:2px solid;border-color:var(--hi) var(--sh2) var(--sh2) var(--hi);
    font-family:var(--pixel);font-size:9px;display:flex;align-items:center;justify-content:center;
    color:#000;cursor:default;line-height:1}
  .menubar{display:flex;gap:16px;padding:3px 12px;margin:0 3px 3px;
    font-family:var(--read);font-size:20px;border-bottom:1px solid var(--sh)}
  .menubar span u{text-decoration:underline}
  /* ---- body split ---- */
  .content{display:flex;gap:18px;padding:16px;flex-wrap:wrap}
  .stage{
    flex:1 1 380px;min-width:320px;
    background:#fff;position:relative;
    border:3px solid;border-color:var(--sh) var(--hi) var(--hi) var(--sh); /* sunken */
    display:flex;align-items:flex-end;justify-content:center;
    padding:24px 12px 12px;overflow:hidden;
  }
  .char-stack{position:relative;width:100%;display:flex;justify-content:center}
  .shadow{position:absolute;bottom:-2%;left:50%;transform:translateX(-50%);
    width:78%;z-index:0;pointer-events:none}
  .char-box{position:relative;z-index:1;height:66vh;max-height:600px}
  .char{height:100%;width:auto;display:block}
  .animal{position:absolute;z-index:2;display:none;image-rendering:pixelated}
  #animal-dog{height:30%;left:-4%;bottom:0}
  #animal-bird{height:15%;left:59.9%;top:21.8%}
  .animal.show{display:block}

  /* ---- controls ---- */
  .panel{flex:1 1 420px;min-width:320px;display:flex;flex-direction:column;gap:14px}
  .fieldset{
    border:2px solid;border-color:var(--sh) var(--hi) var(--hi) var(--sh);
    padding:14px 16px 16px;position:relative;background:var(--silver);
  }
  .fieldset > .legend{
    position:absolute;top:-11px;left:10px;background:var(--silver);padding:0 6px;
    font-family:var(--pixel);font-size:10px;color:#000}
  .app-title{font-family:var(--pixel);font-size:13px;line-height:1.5;margin:2px 0 4px}
  .group{margin-bottom:14px}
  .group:last-child{margin-bottom:0}
  .group > label{display:block;font-size:22px;margin-bottom:7px;font-weight:700;letter-spacing:.5px}
  .swatches{display:flex;gap:12px}
  .sw{
    width:50px;height:50px;cursor:pointer;position:relative;background:var(--c);
    border:3px solid;border-color:var(--hi) var(--sh2) var(--sh2) var(--hi); /* raised */
    image-rendering:pixelated;
  }
  .sw:active{border-color:var(--sh2) var(--hi) var(--hi) var(--sh2)}
  .sw[aria-checked="true"]{
    border-color:var(--sh2) var(--hi) var(--hi) var(--sh2); /* pressed */
    outline:2px dotted #000;outline-offset:2px;
  }
  .sw .noicon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--read);font-size:26px;color:#555}
  /* download */
  .dl-row{display:flex;justify-content:center;align-items:center;padding-top:4px}
  .dl-btn{background:none;border:0;padding:0;cursor:pointer;image-rendering:pixelated;
    transition:transform .05s ease}
  .dl-btn img{display:block;width:260px;height:auto;image-rendering:pixelated}
  .dl-btn:active{transform:translate(2px,2px)}
  .hint{font-size:19px;color:#222;text-align:center;margin-top:2px}
  @media(max-width:820px){
    .char-box{height:44vh}
    .titlebar .t{font-size:9px}
    .app-title{font-size:11px}
  }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="t"><span class="ico"></span>Kreator Bohatera — Czytaj.pl</div>
      <div class="winbtns"><b>_</b><b>□</b><b>×</b></div>
    </div>
    <div class="menubar">
      <span><u>P</u>lik</span><span><u>E</u>dycja</span><span><u>W</u>idok</span><span>Pomo<u>c</u></span>
    </div>

    <div class="content">
      <!-- character -->
      <div class="stage">
        <div class="char-stack">
          <img class="shadow" src="assets/shadow.png" alt="">
          <div class="char-box">
            <img class="char" id="char" alt="Twój bohater">
            <img class="animal" id="animal-dog"  src="assets/animal_dog.png"  alt="Pies">
            <img class="animal" id="animal-bird" src="assets/animal_bird.png" alt="Ptak">
          </div>
        </div>
      </div>

      <!-- controls -->
      <div class="panel">
        <div class="fieldset">
          <span class="legend">Kreator</span>
          <div class="app-title">STWÓRZ SWOJEGO<br>BOHATERA</div>

          <div class="group" data-part="hair">
            <label>Włosy</label>
            <div class="swatches">
              <div class="sw" data-val="navy"   style="--c:#0B0B5A" role="radio" tabindex="0"></div>
              <div class="sw" data-val="purple" style="--c:#A943FF" role="radio" tabindex="0"></div>
              <div class="sw" data-val="blonde" style="--c:#F7F154" role="radio" tabindex="0"></div>
            </div>
          </div>

          <div class="group" data-part="blouse">
            <label>Bluzka</label>
            <div class="swatches">
              <div class="sw" data-val="white" style="--c:#ffffff" role="radio" tabindex="0"></div>
              <div class="sw" data-val="blue"  style="--c:#5145C4" role="radio" tabindex="0"></div>
            </div>
          </div>

          <div class="group" data-part="pants">
            <label>Spodnie</label>
            <div class="swatches">
              <div class="sw" data-val="blue"   style="--c:#0727FF" role="radio" tabindex="0"></div>
              <div class="sw" data-val="pink"   style="--c:#F99ECF" role="radio" tabindex="0"></div>
              <div class="sw" data-val="purple" style="--c:#A253FF" role="radio" tabindex="0"></div>
            </div>
          </div>

          <div class="group" data-part="animal">
            <label>Zwierzę</label>
            <div class="swatches">
              <div class="sw" data-val="none" style="--c:#e6e6e6" role="radio" tabindex="0" title="Brak">
                <span class="noicon">∅</span></div>
              <div class="sw" data-val="bird" style="--c:#F7F154;background-image:url(assets/animal_bird.png);background-size:64%;background-repeat:no-repeat;background-position:center" role="radio" tabindex="0" title="Ptak"></div>
              <div class="sw" data-val="dog"  style="--c:#12123a;background-image:url(assets/animal_dog.png);background-size:78%;background-repeat:no-repeat;background-position:center" role="radio" tabindex="0" title="Pies"></div>
            </div>
          </div>
        </div>

        <div class="fieldset">
          <span class="legend">Zapisz</span>
          <div class="dl-row">
            <button class="dl-btn" id="download" aria-label="Pobierz PNG">
              <img src="assets/download-button.svg" alt="Pobierz PNG">
            </button>
          </div>
          <div class="hint">Zapisze przezroczysty plik .PNG z Twoim bohaterem</div>
        </div>
      </div>
    </div>
  </div>

<script>
  const PANTS_MAP = { blue:"blue", pink:"pink", purple:"yellow" };
  const state = { hair:"navy", blouse:"white", pants:"blue", animal:"none" };

  // bird-on-shoulder placement (fractions of the character image)
  const BIRD = { h:0.15, cx:0.721, by:0.3676 };   // height, center-x, bottom-y
  const DOG  = { h:0.30, x:-0.04, by:1.0 };        // height, left, bottom-y (feet)

  const img = document.getElementById('char');
  const animalEls = { dog:document.getElementById('animal-dog'), bird:document.getElementById('animal-bird') };
  const assetName = () => `assets/${state.hair}_${state.blouse}_${PANTS_MAP[state.pants]}.png`;

  function render(){
    img.src = assetName();
    animalEls.dog.classList.toggle('show', state.animal==='dog');
    animalEls.bird.classList.toggle('show', state.animal==='bird');
    document.querySelectorAll('.group').forEach(g=>{
      const part=g.dataset.part;
      g.querySelectorAll('.sw').forEach(sw=>{
        sw.setAttribute('aria-checked', sw.dataset.val===state[part] ? 'true':'false');
      });
    });
  }

  document.querySelectorAll('.group').forEach(g=>{
    const part=g.dataset.part;
    g.querySelectorAll('.sw').forEach(sw=>{
      const pick=()=>{ state[part]=sw.dataset.val; render(); };
      sw.addEventListener('click', pick);
      sw.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();}});
    });
  });

  // ---- download: composite character + animal into one transparent PNG ----
  const load = src => new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; });
  async function composite(){
    const c = await load(assetName());
    const W=c.naturalWidth, H=c.naturalHeight;
    const rects=[{x:0,y:0,w:W,h:H,img:c}];
    if(state.animal==='bird'){
      const a=await load('assets/animal_bird.png');
      const h=BIRD.h*H, w=a.naturalWidth*(h/a.naturalHeight);
      rects.push({x:BIRD.cx*W - w/2, y:BIRD.by*H - h, w, h, img:a});
    } else if(state.animal==='dog'){
      const a=await load('assets/animal_dog.png');
      const h=DOG.h*H, w=a.naturalWidth*(h/a.naturalHeight);
      rects.push({x:DOG.x*W, y:DOG.by*H - h, w, h, img:a});
    }
    const minX=Math.min(...rects.map(r=>r.x)), maxX=Math.max(...rects.map(r=>r.x+r.w));
    const minY=Math.min(...rects.map(r=>r.y)), maxY=Math.max(...rects.map(r=>r.y+r.h));
    const cv=document.createElement('canvas');
    cv.width=Math.ceil(maxX-minX); cv.height=Math.ceil(maxY-minY);
    const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
    for(const r of rects) ctx.drawImage(r.img, r.x-minX, r.y-minY, r.w, r.h);
    return cv;
  }
  document.getElementById('download').addEventListener('click', async ()=>{
    const name=`czytajpl-bohater-${state.hair}-${state.blouse}-${state.pants}`+
               (state.animal!=='none'?`-${state.animal}`:'')+'.png';
    try{
      const cv=await composite();
      cv.toBlob(blob=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob); a.download=name;
        document.body.appendChild(a); a.click(); a.remove();
      },'image/png');
    }catch(e){
      const a=document.createElement('a'); a.href=assetName(); a.download=name;
      document.body.appendChild(a); a.click(); a.remove();
    }
  });

  render();
</script>
</body>
</html>
