<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czytaj.pl — Stwórz swojego bohatera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1c3a;
    --muted:#8C8C8C;
    --ring:#4a3fd6;
    --radius:28px;
    --font:"Lato","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);color:var(--ink);
    min-height:100vh;overflow-x:hidden;position:relative;
    background:linear-gradient(180deg,#bfe4fb 0%,#9fd0f4 55%,#8fc6f0 100%);
  }
  /* ---------- moving sky ---------- */
  .scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .sky-track{display:flex;height:100%;width:max-content;
    animation:sky 100s linear infinite;will-change:transform}
  .sky-tile{height:100%;aspect-ratio:4000/500;flex:0 0 auto;
    background:url(assets/clouds-bg.jpg) center/cover no-repeat;image-rendering:pixelated}
  @keyframes sky{ from{transform:translateX(-50%)} to{transform:translateX(0)} }

  /* ---------- big logos, one centered line, flow with clouds ---------- */
  .logo-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;
    display:flex;align-items:center}
  .logo-track{display:flex;align-items:center;width:max-content;
    animation:logos 86s linear infinite;will-change:transform}
  .logo-set{display:flex;align-items:center;flex:0 0 auto}
  .logo-set img{height:230px;width:auto;margin:0 90px;opacity:.7}
  @keyframes logos{ from{transform:translateX(-50%)} to{transform:translateX(0)} }

  /* ---------- modal ---------- */
  .modal{
    position:relative;z-index:2;min-height:100vh;
    display:flex;align-items:center;justify-content:center;gap:26px;
    padding:40px;flex-wrap:wrap;
  }
  .card{
    background:#fff;border-radius:var(--radius);
    box-shadow:0 24px 60px rgba(30,40,90,.22);
  }
  .hero-card{
    flex:0 0 auto;width:480px;max-width:100%;
    padding:0 24px 24px;position:relative;overflow:visible;
    display:flex;align-items:flex-end;justify-content:center;height:640px;
  }
  .hero-stack{position:relative;display:flex;justify-content:center;width:100%}
  .hero-shadow{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);
    width:74%;opacity:.38;z-index:0;pointer-events:none}
  .char-box{position:relative;z-index:1;height:800px}
  .char{height:100%;width:auto;display:block}
  .animal{position:absolute;z-index:2;display:none;image-rendering:pixelated}
  #animal-dog{height:30%;left:-4%;bottom:0}
  #animal-bird{height:13.5%;left:46.97%;top:-7.5%}
  .animal.show{display:block}

  .options-card{
    flex:0 0 auto;width:520px;max-width:100%;padding:38px 40px;height:640px;
    display:flex;flex-direction:column;
  }
  .options-card h1{display:flex;align-items:center;justify-content:space-between;gap:16px;
    font-size:21px;font-weight:400;text-transform:uppercase;letter-spacing:.02em;margin-bottom:26px}
  .options-card h1 .title-txt{flex:1 1 auto}
  .title-logo{height:22px;width:auto;flex:0 0 auto;filter:brightness(0);opacity:.85}
  .group{margin-bottom:24px}
  .group > label{display:block;font-size:16px;font-weight:700;margin-bottom:10px}
  .swatches{display:flex;gap:14px}
  .sw{width:52px;height:52px;border-radius:12px;cursor:pointer;position:relative;
    background:var(--c);border:1px solid rgba(0,0,0,.10);
    transition:transform .08s ease;image-rendering:pixelated}
  .sw:hover{transform:translateY(-2px)}
  .sw[aria-checked="true"]{outline:3px solid var(--ring);outline-offset:3px;border-color:transparent}
  .sw .noicon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#b6b6b6}
  .dl-row{margin-top:6px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .dl-btn{background:none;border:0;padding:0;cursor:pointer;image-rendering:pixelated;
    transition:transform .05s ease}
  .dl-btn img{display:block;width:240px;height:auto;image-rendering:pixelated}
  .dl-btn:active{transform:translate(2px,2px)}
  .hint{font-size:13px;color:var(--muted);text-align:center}

  @media(max-width:860px){
    .modal{gap:18px;padding:22px}
    .hero-card{width:100%;height:460px}
    .char-box{height:575px}
    .options-card{width:100%;height:auto}
    .logo-set img{height:110px;margin:0 50px}
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="sky-track">
      <div class="sky-tile"></div>
      <div class="sky-tile"></div>
    </div>
    <div class="logo-layer">
      <div class="logo-track">
        <div class="logo-set">
          <img src="assets/logo-combined.png" alt="">
        </div>
        <div class="logo-set">
          <img src="assets/logo-combined.png" alt="">
        </div>
      </div>
    </div>
  </div>

  <div class="modal">
    <!-- hero -->
    <div class="card hero-card">
      <div class="hero-stack">
        <img class="hero-shadow" src="assets/shadow.png" alt="">
        <div class="char-box">
          <img class="char" id="char" alt="Twój bohater">
          <img class="animal" id="animal-dog"  src="assets/animal_dog.png"  alt="Pies">
          <img class="animal" id="animal-bird" src="assets/animal_bird.png" alt="Ptak">
        </div>
      </div>
    </div>

    <!-- options -->
    <div class="card options-card">
      <h1><span class="title-txt">Stwórz swojego bohatera</span><img class="title-logo" src="assets/logo-brand.svg" alt="Czytaj.pl"></h1>

      <div class="group" data-part="hair">
        <label>Włosy</label>
        <div class="swatches">
          <div class="sw" data-val="navy"   style="--c:#0B0B5A" role="radio" tabindex="0"></div>
          <div class="sw" data-val="purple" style="--c:#A943FF" role="radio" tabindex="0"></div>
          <div class="sw" data-val="blonde" style="--c:#F7F154" role="radio" tabindex="0"></div>
        </div>
      </div>

      <div class="group" data-part="blouse">
        <label>Bluzka</label>
        <div class="swatches">
          <div class="sw" data-val="white" style="--c:#ffffff" role="radio" tabindex="0"></div>
          <div class="sw" data-val="blue"  style="--c:#5145C4" role="radio" tabindex="0"></div>
        </div>
      </div>

      <div class="group" data-part="pants">
        <label>Spodnie</label>
        <div class="swatches">
          <div class="sw" data-val="blue"   style="--c:#0727FF" role="radio" tabindex="0"></div>
          <div class="sw" data-val="pink"   style="--c:#F99ECF" role="radio" tabindex="0"></div>
          <div class="sw" data-val="purple" style="--c:#A253FF" role="radio" tabindex="0"></div>
        </div>
      </div>

      <div class="group" data-part="animal">
        <label>Zwierzę</label>
        <div class="swatches">
          <div class="sw" data-val="none" style="--c:#f0f0f0" role="radio" tabindex="0" title="Brak">
            <span class="noicon">∅</span></div>
          <div class="sw" data-val="bird" style="--c:#F7F154;background-image:url(assets/animal_bird.png);background-size:64%;background-repeat:no-repeat;background-position:center" role="radio" tabindex="0" title="Ptak"></div>
          <div class="sw" data-val="dog"  style="--c:#12123a;background-image:url(assets/animal_dog.png);background-size:78%;background-repeat:no-repeat;background-position:center" role="radio" tabindex="0" title="Pies"></div>
        </div>
      </div>

      <div class="dl-row">
        <button class="dl-btn" id="download" aria-label="Pobierz PNG">
          <img src="assets/download-button.svg" alt="Pobierz PNG">
        </button>
        <div class="hint">Zapisze przezroczysty plik .PNG z Twoim bohaterem</div>
      </div>
    </div>
  </div>

<script>
  const PANTS_MAP = { blue:"blue", pink:"pink", purple:"yellow" };
  const state = { hair:"navy", blouse:"white", pants:"blue", animal:"none" };
  const BIRD = { h:0.135, cx:0.523, by:0.06 };
  const DOG  = { h:0.30, x:-0.04, by:1.0 };

  const img = document.getElementById('char');
  const animalEls = { dog:document.getElementById('animal-dog'), bird:document.getElementById('animal-bird') };
  const assetName = () => `assets/${state.hair}_${state.blouse}_${PANTS_MAP[state.pants]}.png`;

  function render(){
    img.src = assetName();
    animalEls.dog.classList.toggle('show', state.animal==='dog');
    animalEls.bird.classList.toggle('show', state.animal==='bird');
    document.querySelectorAll('.group').forEach(g=>{
      const part=g.dataset.part;
      g.querySelectorAll('.sw').forEach(sw=>
        sw.setAttribute('aria-checked', sw.dataset.val===state[part] ? 'true':'false'));
    });
  }
  document.querySelectorAll('.group').forEach(g=>{
    const part=g.dataset.part;
    g.querySelectorAll('.sw').forEach(sw=>{
      const pick=()=>{ state[part]=sw.dataset.val; render(); };
      sw.addEventListener('click', pick);
      sw.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();}});
    });
  });

  const load = src => new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; });
  async function composite(){
    const c = await load(assetName());
    const W=c.naturalWidth, H=c.naturalHeight;
    const rects=[{x:0,y:0,w:W,h:H,img:c}];
    if(state.animal==='bird'){
      const a=await load('assets/animal_bird.png');
      const h=BIRD.h*H, w=a.naturalWidth*(h/a.naturalHeight);
      rects.push({x:BIRD.cx*W - w/2, y:BIRD.by*H - h, w, h, img:a});
    } else if(state.animal==='dog'){
      const a=await load('assets/animal_dog.png');
      const h=DOG.h*H, w=a.naturalWidth*(h/a.naturalHeight);
      rects.push({x:DOG.x*W, y:DOG.by*H - h, w, h, img:a});
    }
    const minX=Math.min(...rects.map(r=>r.x)), maxX=Math.max(...rects.map(r=>r.x+r.w));
    const minY=Math.min(...rects.map(r=>r.y)), maxY=Math.max(...rects.map(r=>r.y+r.h));
    const cv=document.createElement('canvas');
    cv.width=Math.ceil(maxX-minX); cv.height=Math.ceil(maxY-minY);
    const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
    for(const r of rects) ctx.drawImage(r.img, r.x-minX, r.y-minY, r.w, r.h);
    return cv;
  }
  document.getElementById('download').addEventListener('click', async ()=>{
    const name=`czytajpl-bohater-${state.hair}-${state.blouse}-${state.pants}`+
               (state.animal!=='none'?`-${state.animal}`:'')+'.png';
    try{
      const cv=await composite();
      cv.toBlob(blob=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob); a.download=name;
        document.body.appendChild(a); a.click(); a.remove();
      },'image/png');
    }catch(e){
      const a=document.createElement('a'); a.href=assetName(); a.download=name;
      document.body.appendChild(a); a.click(); a.remove();
    }
  });

  render();
</script>
</body>
</html>
